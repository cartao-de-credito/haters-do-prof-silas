<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clube dos Haters do Silas</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Fredoka', sans-serif;
  background: linear-gradient(180deg,#8fe8ff,#00cfff,#0077cc,#aeefff);
}

/* WINDOW GLASS */
.window {
  width: 900px;
  margin: 40px auto;
  border-radius: 20px;

  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.6);

  box-shadow:
    0 0 40px rgba(0,200,255,0.6),
    inset 0 0 20px rgba(255,255,255,0.5);
}

/* TITLEBAR */
.titlebar {
  height: 34px;
  border-radius: 20px 20px 0 0;
  background: linear-gradient(#6ec6ff,#1e90ff,#0057c7);
  color: white;
  display:flex;
  align-items:center;
  justify-content: space-between;
  padding: 0 12px;

  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.8),
    0 0 20px rgba(0,150,255,0.6);
}

/* HEADER */
.header {
  text-align:center;
  padding:60px;
  background: linear-gradient(#b6f0ff,#00cfff,#0088cc);
}

.header h1 {
  margin:0;
  font-size:50px;
  color:white;
  text-shadow:
    0 0 10px white,
    0 0 20px #00e0ff,
    0 0 40px #00e0ff;
}

.slogan { color:white; }

/* CARDS */
.content {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  position: relative;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:15px;

  box-shadow:
    0 0 20px rgba(0,200,255,0.7),
    inset 0 2px 6px rgba(255,255,255,0.9);
}

/* shine effect */
.card::before {
  content:"";
  position:absolute;
  top:0;
  left:-50%;
  width:200%;
  height:100%;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  transform: skewX(-20deg);
  opacity:0.4;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* FORUM */
.forum {
  padding:20px;
}

input, textarea {
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:12px;

  background: linear-gradient(#00cfff,#0077cc);
  color:white;

  box-shadow:
    0 0 10px #00e0ff,
    inset 0 2px 4px rgba(255,255,255,0.8);

  cursor:pointer;
}

button:hover {
  transform: scale(1.05);
}

/* POSTS */
.post {
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);

  border-radius:15px;
  padding:10px;
  margin-top:15px;

  box-shadow:
    0 0 15px rgba(0,200,255,0.6),
    inset 0 2px 5px rgba(255,255,255,0.8);
}

.username {
  font-weight:bold;
  color:#0055aa;
}

.like {
  cursor:pointer;
  color:#ff3366;
}
</style>
</head>

<body>

<div class="window">

<div class="titlebar">
clube_dos_haters_do_silas.exe
</div>

<div class="header">
<h1>CLUBE DOS HATERS DO SILAS</h1>
<div class="slogan">Investindo bem nos alunos que também odeiam o silas!!!!</div>
</div>

<div class="content">
  <div class="card">
    <h2>motivo #1</h2>
    <p>passou 2763 atividades 💀</p>
    <img src="https://static.wikia.nocookie.net/battlefordreamisland/images/5/51/2763Character.png">
  </div>
</div>

<div class="forum">
<h2>Mini Rede Social</h2>

<input id="name" placeholder="Seu nome">
<textarea id="comment" placeholder="Escreva algo..."></textarea>
<input type="file" id="imageUpload">

<button onclick="postComment()">Postar</button>

<div id="posts"></div>
</div>

</div>

<script>
function getPosts(){
  return JSON.parse(localStorage.getItem("posts") || "[]");
}

function savePosts(posts){
  localStorage.setItem("posts", JSON.stringify(posts));
}

function render(){
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let posts = getPosts();
  posts.sort((a,b)=>b.id-a.id);

  posts.forEach(p=>{
    const div = document.createElement("div");
    div.className="post";

    div.innerHTML = `
      <div class="username">${p.name}</div>
      <p>${p.text}</p>
      ${p.image ? `<img src="${p.image}" width="200">` : ""}
      <div class="like">❤️ ${p.likes}</div>
    `;

    div.querySelector(".like").onclick = ()=>{
      p.likes++;
      savePosts(posts);
      render();
    };

    container.appendChild(div);
  });
}

function postComment(){
  const name = document.getElementById("name").value || "Anônimo";
  const text = document.getElementById("comment").value;
  const file = document.getElementById("imageUpload").files[0];

  if(!text && !file) return;

  const posts = getPosts();

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      posts.push({
        id: Date.now(),
        name,
        text,
        image: e.target.result,
        likes:0
      });
      savePosts(posts);
      render();
    };
    reader.readAsDataURL(file);
  } else {
    posts.push({
      id: Date.now(),
      name,
      text,
      image:null,
      likes:0
    });
    savePosts(posts);
    render();
  }
}

render();
</script>

</body>
</html>
