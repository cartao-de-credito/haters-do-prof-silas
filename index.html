<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clube dos Haters do Silas</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI;
  background: linear-gradient(#6ec6ff,#1e90ff,#0b3c91);
}

.window {
  width: 900px;
  margin: 40px auto;
  background: #e6f2ff;
  border-radius: 10px;
  padding: 20px;
}

.post {
  background: white;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
}

.like { cursor: pointer; color: red; }
</style>
</head>

<body>

<div class="window">

<h1>CLUBE DOS HATERS DO SILAS</h1>

<input id="name" placeholder="Seu nome">
<textarea id="comment" placeholder="Mensagem"></textarea>
<input type="file" id="imageUpload">
<button onclick="postComment()">Postar</button>

<div id="posts"></div>

</div>

<script>
function getPosts() {
  return JSON.parse(localStorage.getItem("posts") || "[]");
}

function savePosts(posts) {
  localStorage.setItem("posts", JSON.stringify(posts));
}

function render() {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let posts = getPosts();

  posts.sort((a,b)=>b.id-a.id);

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${p.name}</b>
      <p>${p.text}</p>
      ${p.image ? `<img src="${p.image}" width="200">` : ""}
      <div class="like">❤️ ${p.likes}</div>
    `;

    div.querySelector(".like").onclick = () => {
      p.likes++;
      savePosts(posts);
      render();
    };

    container.appendChild(div);
  });
}

function postComment() {
  const name = document.getElementById("name").value || "Anon";
  const text = document.getElementById("comment").value;
  const file = document.getElementById("imageUpload").files[0];

  if (!text && !file) return;

  const posts = getPosts();

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      posts.push({
        id: Date.now(),
        name,
        text,
        image: e.target.result,
        likes: 0
      });
      savePosts(posts);
      render();
    };
    reader.readAsDataURL(file);
  } else {
    posts.push({
      id: Date.now(),
      name,
      text,
      image: null,
      likes: 0
    });
    savePosts(posts);
    render();
  }
}

// load on start
render();
</script>

</body>
</html>
