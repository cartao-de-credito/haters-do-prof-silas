<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clube dos Haters do Silas</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Tahoma;
  background: linear-gradient(180deg,#6ec6ff,#1e90ff,#0b3c91);
}

.window {
  width: 900px;
  margin: 40px auto;
  border-radius: 8px;
  background: linear-gradient(#dfefff,#a9cfff);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.titlebar {
  height: 32px;
  background: linear-gradient(#5fa8ff,#2d6cdf);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  color: white;
}

.header {
  text-align:center;
  padding:50px;
  background: linear-gradient(#9be7ff,#00bfff,#0077cc);
}

.header h1 {
  margin:0;
  color:white;
  text-shadow:0 0 10px white;
}

.slogan {
  color:white;
}

.forum {
  padding:20px;
}

.forum h2 {
  color:#0055aa;
}

input, textarea {
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:8px;
  border:1px solid #aaa;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0077cc;
  color:white;
  cursor:pointer;
}

.post {
  margin-top:15px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.username {
  font-weight:bold;
}

</style>
</head>

<body>

<div class="window">

<div class="titlebar">
  clube_dos_haters_do_silas.exe
</div>

<div class="header">
  <h1>CLUBE DOS HATERS DO SILAS</h1>
  <div class="slogan">Investindo bem nos alunos que também odeiam o silas!!!!</div>
</div>

<div class="forum">
  <h2>Fórum dos Haters</h2>

  <input type="text" id="name" placeholder="Seu nome">
  <textarea id="comment" placeholder="Escreva algo..."></textarea>
  <input type="file" id="imageUpload">
  <button onclick="postComment()">Postar</button>

  <div id="posts"></div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// REALTIME POSTS (THIS FIXES YOUR PROBLEM)
onSnapshot(collection(db, "posts"), (snapshot) => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  snapshot.forEach((doc) => {
    const p = doc.data();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="username">${p.name}</div>
      <p>${p.text}</p>
      ${p.image ? `<img src="${p.image}" width="200">` : ""}
    `;

    container.appendChild(div);
  });
});

// POST FUNCTION
window.postComment = async function () {
  const name = document.getElementById("name").value || "Anônimo";
  const text = document.getElementById("comment").value;
  const file = document.getElementById("imageUpload").files[0];

  if (!text && !file) return;

  if (file) {
    const reader = new FileReader();
    reader.onload = async function (e) {
      await addDoc(collection(db, "posts"), {
        name,
        text,
        image: e.target.result
      });
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      name,
      text,
      image: null
    });
  }
};
</script>

</body>
</html>
