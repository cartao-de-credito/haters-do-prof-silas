<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clube dos Haters do Silas</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Tahoma;
  background: linear-gradient(180deg,#6ec6ff,#1e90ff,#0b3c91);
}

.window {
  width: 900px;
  margin: 40px auto;
  border-radius: 8px;
  background: linear-gradient(#dfefff,#a9cfff);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.titlebar {
  height: 32px;
  background: linear-gradient(#5fa8ff,#2d6cdf);
  display: flex;
  align-items: center;
  padding: 0 10px;
  color: white;
}

.header {
  text-align:center;
  padding:50px;
  background: linear-gradient(#9be7ff,#00bfff,#0077cc);
}

.header h1 {
  margin:0;
  color:white;
}

.content {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:12px;
  padding:15px;
}

.forum {
  padding:20px;
}

input, textarea {
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:8px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0077cc;
  color:white;
  cursor:pointer;
}

.post {
  margin-top:15px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.like {
  color:#ff3366;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="window">

<div class="titlebar">
clube_dos_haters_do_silas.exe
</div>

<div class="header">
<h1>CLUBE DOS HATERS DO SILAS</h1>
</div>

<div class="content">
  <div class="card">
    <h2>motivo #1</h2>
    <p>passou 2763 atividades 💀</p>
  </div>
</div>

<div class="forum">
<h2>Mini Rede Social</h2>

<input id="name" placeholder="Seu nome">
<textarea id="comment" placeholder="Escreva algo..."></textarea>
<input type="file" id="imageUpload">

<button onclick="postComment()">Postar</button>

<div id="posts"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔴 PUT YOUR REAL CONFIG HERE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔄 LOAD POSTS (NO orderBy = NO BUG)
onSnapshot(collection(db, "posts"), (snapshot) => {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  let posts = [];

  snapshot.forEach(docSnap => {
    posts.push({ id: docSnap.id, ...docSnap.data() });
  });

  // sort manually
  posts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <b>${p.name}</b>
      <p>${p.text}</p>
      ${p.image ? `<img src="${p.image}" width="200">` : ""}
      <div class="like">❤️ ${p.likes || 0}</div>
    `;

    div.querySelector(".like").onclick = () => {
      updateDoc(doc(db, "posts", p.id), {
        likes: (p.likes || 0) + 1
      });
    };

    container.appendChild(div);
  });
});

// ✏️ POST
window.postComment = async function () {
  const name = document.getElementById("name").value || "Anônimo";
  const text = document.getElementById("comment").value;
  const file = document.getElementById("imageUpload").files[0];

  if (!text && !file) return;

  let image = null;

  if (file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      await addDoc(collection(db, "posts"), {
        name,
        text,
        image: e.target.result,
        likes: 0,
        createdAt: Date.now()
      });
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      name,
      text,
      image: null,
      likes: 0,
      createdAt: Date.now()
    });
  }
};
</script>

</body>
</html>
