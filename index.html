<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clube dos Haters do Silas</title>

<style>
body {
  margin: 0;
  font-family: Segoe UI, Tahoma;
  background: linear-gradient(180deg,#6ec6ff,#1e90ff,#0b3c91);
}

.window {
  width: 900px;
  margin: 40px auto;
  border-radius: 8px;
  background: linear-gradient(#dfefff,#a9cfff);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.titlebar {
  height: 32px;
  background: linear-gradient(#5fa8ff,#2d6cdf);
  display: flex;
  align-items: center;
  padding: 0 10px;
  color: white;
}

.header {
  text-align:center;
  padding:50px;
  background: linear-gradient(#9be7ff,#00bfff,#0077cc);
}

.header h1 {
  margin:0;
  color:white;
  text-shadow:0 0 10px white;
}

.slogan {
  color:white;
}

.forum {
  padding:20px;
}

input, textarea {
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:8px;
  border:1px solid #aaa;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#0077cc;
  color:white;
  cursor:pointer;
}

.post {
  margin-top:15px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.username {
  font-weight:bold;
}

.like {
  cursor:pointer;
  color:#ff3366;
}
</style>
</head>

<body>

<div class="window">
  <div class="titlebar">clube_dos_haters_do_silas.exe</div>

  <div class="header">
    <h1>CLUBE DOS HATERS DO SILAS</h1>
    <div class="slogan">Investindo bem nos alunos que também odeiam o silas!!!!</div>
  </div>

  <div class="forum">
    <h2>Fórum dos Haters</h2>

    <input id="name" placeholder="Seu nome">
    <textarea id="comment" placeholder="Escreva algo..."></textarea>
    <input type="file" id="imageUpload">
    <button onclick="postComment()">Postar</button>

    <div id="posts"></div>
  </div>
</div>

<script>
const API = "/api/posts";

// 🔒 escape (important)
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[c]));
}

// 🎨 render
function renderPosts(posts) {
  const container = document.getElementById("posts");
  container.innerHTML = "";

  posts.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="username">${escapeHtml(p.name)}</div>
      <p>${escapeHtml(p.text)}</p>
      ${p.image ? `<img src="${escapeHtml(p.image)}" width="200">` : ""}
      <div class="like">❤️ ${p.likes || 0}</div>
    `;

    div.querySelector(".like").onclick = async () => {
      await fetch(`${API}?id=${encodeURIComponent(p.id)}`, {
        method: "PATCH"
      });
      loadPosts();
    };

    container.appendChild(div);
  });
}

// 🔄 load posts
async function loadPosts() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();
    renderPosts(data.posts || []);
  } catch (err) {
    console.error("load error", err);
  }
}

// 📸 read image
function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ✏️ post
async function postComment() {
  const nameEl = document.getElementById("name");
  const commentEl = document.getElementById("comment");
  const fileEl = document.getElementById("imageUpload");

  const name = nameEl.value || "Anônimo";
  const text = commentEl.value;
  const file = fileEl.files[0];

  if (!text && !file) return;

  let image = null;

  if (file) {
    image = await readFile(file);
  }

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, text, image })
  });

  commentEl.value = "";
  fileEl.value = "";

  loadPosts();
}

// 🔁 auto refresh
setInterval(loadPosts, 3000);

// 🚀 initial
loadPosts();
</script>

</body>
</html>
